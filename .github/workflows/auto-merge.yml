name: Auto-merge product changelog sync

on:
  push:
    branches:
      - add-jan-feb-2026-releases

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Create or find open PR, then merge
        run: |
          # Find existing open PR
          PR_NUMBER=$(gh pr list \
            --head add-jan-feb-2026-releases \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            # gh pr create returns the PR URL — extract the number from it
            PR_URL=$(gh pr create \
              --title "Auto-sync: product changelog updates ($(date +%Y-%m-%d))" \
              --body "Automated release sync from #product-changelog Slack channel. UK/CA-only releases excluded." \
              --head add-jan-feb-2026-releases \
              --base main)
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #$PR_NUMBER"
          else
            echo "Found existing PR #$PR_NUMBER"
          fi

          gh pr merge "$PR_NUMBER" --merge --delete-branch=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
